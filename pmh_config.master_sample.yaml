# ==============================================================================
# [BASE] - 이 서버(노드) 자체의 구동 환경 설정
# ==============================================================================
BASE:
  # PMH 서버 구동 포트
  PORT: 8899
  # 프론트엔드나 마스터 서버가 이 노드에 접근할 때 사용할 키
  APIKEY: "YOUR_SECRET_KEY"

  # Plex 서버 설정 (Plex API 통신용)
  PLEX_URL: "http://plex:32400"
  PLEX_TOKEN: "YOUR_PLEX_TOKEN"
  PLEX_MACHINE_IDENTIFIER: "YOUR_PLEX_MACHINE_ID_HERE"

  # Plex 메인 DB 파일 경로 (sqlite3 접근용)
  # 예시:
  #   Windows: "C:\\Users\\Username\\AppData\\Local\\Plex Media Server\\Plug-in Support\\Databases\\com.plexapp.plugins.library.db"
  #   Linux/Docker: "/config/Library/Application Support/Plex Media Server/Plug-in Support/Databases/com.plexapp.plugins.library.db"
  PLEX_DB_PATH: "/config/Library/Application Support/Plex Media Server/Plug-in Support/Databases/com.plexapp.plugins.library.db"
  # Plex SQLite 바이너리 파일 경로 (DB 수정 쿼리 우회용)
  PLEX_SQLITE_BIN: "/usr/lib/plexmediaserver/Plex SQLite"

  # FF 연결 정보
  FF_URL: "http://localhost:9999"
  FF_APIKEY: "YOUR_FF_API_KEY_HERE"

  # (선택) 노드 전역 디스코드 알림 웹훅 URL
  DISCORD_WEBHOOK: ""

  # Fail2Ban 기능 활성화 여부 및 예외 IP 목록
  ENABLE_FAIL2BAN: true
  FAIL2BAN_WHITELIST:
    - "127.0.0.1"
    - "192.168.0.*"
    - "10.0.*.*"

  # (개발용) True일 경우 GitHub 업데이트(덮어쓰기)를 수행하지 않습니다.
  DEV_MODE: false

  # 언매칭시 json 파일을 삭제할 섹션
  # "all"일 경우는 모든 섹션에서 삭제를 시도하고, 비워두거나 설정하지 않으면 삭제하지 않습니다.
  # 개별 섹션을 지정시 쉼표로 구분한 섹션 번호를 입력합니다. (ex: "1, 2, 3, 10")
  DELETE_JSON_SECTION: "1, 2, 3"

  # 해상도 뱃지(SD, HD, 4K 등) 표시 및 자동 분석을 생략할 라이브러리 섹션 ID 목록 (콤마 구분)
  IGNORE_RES_SECTION: "1, 2, 3"

  # 아래 AV 관련 설정은 사용하지 않을 경우 전부 삭제하셔도 됩니다.
  # JAV 매칭 로직을 적용할 라이브러리 섹션 ID 목록 (콤마로 구분, 비워두면 JAV 로직 비활성화)
  JAV_SECTION: "1, 2, 3"

  # JAV Uncensored 매칭 지원 레이블 패턴 (콤마로 구분, 예: "1pon, 10mu, carib, fc2, heyzo, paco")
  UNCENSORED_MATCHABLE_LABELS: ["1pon", "10mu", "carib", "fc2", "heyzo", "paco"]

  # Western AV 전용 로직을 적용할 라이브러리 섹션 ID 목록 (콤마로 구분)
  WESTERN_AV_SECTION: "6, 7"

  # 에이전트 매칭 시 기본 합격 점수 커트라인
  JAV_MIN_SCORE: 95
  WESTERN_MIN_SCORE: 80

  # JAV 매칭 시 적용할 정규식 패턴: 기본 정규식 패턴은 PMH에 내장되어 있으므로, 직접 수정이 필요한 경우가 아니라면 삭제 가능.
  JAV_PARSING_RULES:
    # 일반(범용) 규칙
    generic_rules:
      - '.*?[0-9]*([a-z]+)-([0-9]{2,})(?=[^\d]|\b) => {0}|{1}'
      - '.*?[0-9]*([a-z]+)-?([0-9]{2,})(?=[^\d]|\b) => {0}|{1}'
      - '.*?\b([0-9a-z]*[a-z]+)-([0-9]{2,})(?=[^\d]|\b) => {0}|{1}'
      - '.*?\b([0-9a-z]*[a-z]+)-?([0-9]{2,})(?=[^\d]|\b) => {0}|{1}'

    # Censored용 파싱 규칙
    censored_special_rules:
      # 3DSVR (예: 13dsvr-039.mkv -> 3DSVR-039)
      - '.*?(3dsvr)[-_]?([0-9]+)(?=[^\d]|\b) => {0}|{1}'
      # 741M...-G... (예: 741m683-g02.mp4 -> 741M683-G02)
      - '.*?(?<![0-9])(741[a-z][0-9]{3})[-_]?(g[0-9]{2,})(?=[^\d]|\b) => {0}|{1}'
      # T28/T38 (예: 1t28-635.mkv -> T28-635)
      - '.*?(?<![a-z])(t)[-_]?(28|38)[-_]?([0-9]+)(?=[^\d]|\b) => {0}{1}|{2}'
      # ID
      - '.*?55(id)[-_]?([0-9]{2})([0-9]{3})(?=[^\d]|\b) => {1}{0}|{2}'
      - '.*?(?<![a-z])(id)[-_]?00([0-9]{3})(?=[^\d]|\b) => {0}|{1}'
      - '.*?(?<![a-z])(id)[-_]?([0-9]{2})([0-9]{3})(?=[^\d]|\b) => {1}{0}|{2}'
      - '.*?([0-9]{2})(id)[-_]?([0-9]{3})(?=[^\d]|\b) => {0}{1}|{2}'
      # CPZ...-(H)... (예: 1cpz69h004 -> CPZ69-H004)
      - '.*?(?<![a-z])(cpz)[-_]?([0-9]{2})[-_]?([a-z]?[0-9]{3,})(?=[^\d]|\b) => {0}{1}|{2}'
      # GAREA (예: G-AREA-123 -> GAREA-123)
      - '.*?(?<![a-z])(g)[-_](area)[-_]?([0-9]+)(?=[^\d]|\b) => {0}{1}|{2}'
      # MBRXX (예: MBR-AA-123 -> MBRAA-123)
      - '.*?(?<![a-z])(mar|mbr|mmr)[-_]([a-z]{2})[-_]?([0-9]+)(?=[^\d]|\b) => {0}{1}|{2}'
      # MMC
      - '.*?(?<![0-9])([0-9]{3})(mmc)[-_]?([0-9]+)(?=[^\d]|\b) => {0}{1}|{2}'
      # SCUTE (예: S-CUTE-1234 -> SCUTE-1234)
      - '.*?(?<![a-z])(s)[-_](cute)[-_]?([0-9]+)(?=[^\d]|\b) => {0}{1}|{2}'
      # TOKYO (예: TOKYO247-123 -> TOKYO-123)
      - '.*?(?<![a-z])(tokyo)[-_]?247[-_) ]*([0-9]{3,})(?=[^\d]|\b) => {0}|{1}'
      # WVR
      - '.*?(?<![a-z])(wvr9c)[-_]?([0-9]{3,})\b => {0}|{1}'
      - '.*?(?<![a-z])(wvr)0([1-9])[-_]?([a-z]?[0-9]+)\b => {0}{1}|{2}'
      - '.*?(?<![a-z])(wvr)0*([1-9])[-_]?([a-z]?[0-9]+)\b => {0}{1}|{2}'
      - '.*?(?<![a-z])(wvr)[-_]?([1-9])([0-9]{3,})\b => {0}{1}|{2}'
      # YPP
      - '.*?(?<![0-9])([0-9]{3})(ypp)[-_]?([0-9]+)(?=[^\d]|\b) => {0}{1}|{2}'
      # CD2x
      - '.*?(?<![a-z])(cd)[-_]?([0-9]{2})[-_]?([0-9]{3})(?=[^\d]|\b) => {0}{1}|{2}'
      # R18
      - '.*?(?<![a-z])(r)[-_]?(18)[-_]?([0-9]{3})(?=[^\d]|\b) => {0}{1}|{2}'
      # AK-BS (예: AK-BS-123 -> AKBS-123)
      - '.*?(?<![a-z])(ak)[-_](bs)[-_]?([0-9]+)(?=[^\d]|\b) => {0}{1}|{2}'
      # 레이블 앞 3자리 숫자 유지
      - '.*?(?<![0-9])([0-9]{3})(ap|d|g|good|h|ntr|san|ten|y)[-_]?([0-9]+)(?=[^\d]|\b) => {0}{1}|{2}'
      # 레이블 앞 2자리 숫자 유지
      - '.*?(?<![0-9])([0-9]{2})(ap|ntrd|sora|sps[a-z]|sw|ten)[-_]?([0-9]+)(?=[^\d]|\b) => {0}{1}|{2}'

    # Uncensored용 파싱 규칙
    uncensored_special_rules:
      # 1pondo
      - '.*?(?<![0-9])(1pon|1pondo)[-_\s]?([0-9]{6})[-_](\d{2,3})(?=[^\d]|\b).*? => 1pon|{1}_{2}'
      - '.*?(?<![0-9])([0-9]{6})[-_]([0-9]{2,3})[-_\s]?(1pon|1pondo)\b.*? => 1pon|{0}_{1}'
      # 10musume
      - '.*?(?<![0-9])(10mu|10musume)[-_\s]?([0-9]{6})[-_](\d{2,3})(?=[^\d]|\b).*? => 10mu|{1}_{2}'
      - '.*?(?<![0-9])([0-9]{6})[-_](\d{2,3})[-_\s]?(10mu|10musume)\b.*? => 10mu|{0}_{1}'
      # Pacopacomama
      - '.*?(?<![a-z])(paco|pacopacom|pacopacomama)[-_\s]?([0-9]{6})[-_](\d{2,3})(?=[^\d]|\b).*? => paco|{1}_{2}'
      - '.*?(?<![0-9])([0-9]{6})[-_](\d{2,3})[-_\s]?(paco|pacopacom|pacopacomama)\b.*? => paco|{0}_{1}'
      # Carib
      - '.*?(?<![a-z])carib(bean)?(com)?[-_\s]?([0-9]{6})[-_]?([0-9]{2,3})(?=[^\d]|\b).*? => carib|{2}-{3}'
      - '.*?(?<![0-9])([0-9]{6})[-_]([0-9]{2,3})[-_\s]?carib(bean)?(com)?\b.*? => carib|{0}-{1}'
      # FC2
      - '.*?(?<![a-z])(fc2)[-_\s]?(ppv)?[-_\s]?([0-9]{5,7})(?=[^\d]|\b).*? => {0}|{2}'
      # HEYZO
      - '.*?(?<![a-z])(heyzo)[-_\s]?([0-9]{4})(?=[^\d]|\b).*? => {0}|{1}'
      - '.*?(?<![a-z])(heyzo)[-_\s](?:f?hd)[-_\s]?([0-9]{4})(?=[^\d]|\b).*? => {0}|{1}'
      - '.*?(?<![0-9])([0-9]{4})[-_\s]?(heyzo)(?=[^\d]|\b).*? => {1}|{0}'
      # 기타 레이블 규칙
      - '.*?(?<![a-z])(c0930)[-_]([a-z]+[0-9]+)(?=[^\d]|\b).*? => {0}|{1}'
      # Uncensored용 우선 범용 규칙
      - '.*?\b([0-9a-z]+)-([0-9]+)(?=[^\d]|\b) => {0}|{1}'

# ==============================================================================
# [MASTER] - 프론트엔드 전역 설정 및 게이트웨이 라우팅
# ==============================================================================
# MASTER 설정이 활성화되어 있으면 이 서버는 마스터(Gateway) 역할을 수행합니다.
# 워커 노드로만 사용할 경우 아래 MASTER 블록 전체를 삭제하거나 주석 처리하세요.
MASTER:
  # 자동 업데이트 체크(24h)를 활성화합니다.
  AUTO_UPDATE_CHECK: true

  # Plex 상세 페이지에 파일 경로 표시 시, 지저분한 앞부분 경로를 숨김 처리할 접두어 목록
  DISPLAY_PATH_PREFIXES_TO_REMOVE:
    - "/mnt"

  # Plex 영상 썸네일(태그 뱃지)에 사용자 커스텀 태그를 표시하기 위한 정규식 규칙
  USER_TAGS:
    # PRIORITY_GROUP: 여러 조건 중 첫 번째로 일치하는 1개 태그만 적용됨
    PRIORITY_GROUP:
      - name: "LEAK"
        pattern: "(leaked|유출)"
      - name: "MOPA"
        pattern: "(mopa|모파|모자이크제거)"
        target: "path"
    # INDEPENDENT: 위와 상관없이 조건이 일치하면 모두 독립적으로 태그 추가됨
    INDEPENDENT:
      - name: "REMUX"
        pattern: "remux"
        target: "path"

  # 게이트웨이 라우팅 테이블 (마스터 서버가 명령을 중계할 노드 목록)
  NODES:
    # 첫 번째 노드(마스터 자신)는 설정하지 않아도 프론트엔드에 자동 포함됩니다.
    # 추가 워커 노드가 있다면 아래에 등록합니다.
    - id: "worker_node_2"
      name: "2.MUSIC"
      url: "http://192.168.1.100:8899"
      apikey: "WORKER_SECRET_KEY"
    # - id: "worker_node_3"
    #   name: "Worker Server (Sub DB)"
    #   url: "https://pmh-worker.example.com"
    #   apikey: "WORKER_SECRET_KEY"
