<!-- index.html (모바일 PWA & 태블릿 듀얼뷰 앱) -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PMH Mobile</title>
    <meta name="theme-color" content="#1e2124">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PMH">
    
    <link rel="apple-touch-icon" sizes="180x180" href="/api/client/apple-touch-icon.png">
    <link rel="icon" type="image/png" href="/api/client/favicon-96x96.png" sizes="96x96">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #121212; --panel: #1e2124; --text: #e0e0e0; --primary: #e5a00d; --border: #333; --success: #51a351; --danger: #bd362f; }
        
        html { background-color: #000; }
        body { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow-x: hidden;
        }
        * { box-sizing: border-box; }
        
        .tab-bar { max-width: 1200px; margin: 0 auto; right: 0; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--panel); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        #toast { max-width: 90%; width: max-content; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 9999; box-shadow: 0 5px 15px rgba(0,0,0,0.5); white-space: nowrap; }
        #pwa-install-banner { max-width: 1200px; margin: 0 auto; right: 0; }

        .navbar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .nav-title { color: var(--primary); font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        
        .screen { display: none; padding: 15px; padding-bottom: 70px; animation: fadeIn 0.2s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; color: var(--primary); font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .input-text, .input-select { width: 100%; padding: 14px; background: #0a0a0c; color: #fff; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        .input-text:focus, .input-select:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 16px; background: var(--primary); color: #111; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.2s; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        .btn-success { background: var(--success); color: #fff; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .dash-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 15px; text-align: center; }
        .dash-card.active-run { border-color: var(--primary); background: rgba(229,160,13,0.1); }
        .dash-card.active-cron { border-color: var(--success); background: rgba(81,163,81,0.1); }
        
        .tool-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .tool-card:active { background: rgba(255,255,255,0.05); }
        .tool-card.running { border-left: 4px solid var(--primary); background: rgba(229,160,13,0.05); }
        .tool-icon { font-size: 26px; color: var(--primary); width: 30px; text-align: center; }
        .tool-info { flex: 1; min-width: 0; }
        .tool-title { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: baseline; gap: 6px; }
        .tool-desc { font-size: 12px; color: #aaa; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-run { background: rgba(229,160,13,0.2); color: var(--primary); border: 1px solid var(--primary); }
        .badge-cron { background: rgba(81,163,81,0.2); color: var(--success); border: 1px solid var(--success); }

        .tab-item { flex: 1; padding: 12px 0; text-align: center; color: #666; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .tab-item.active { color: var(--primary); }
        .tab-item.disabled { color: #333; cursor: not-allowed; opacity: 0.5; pointer-events: none; }
        .tab-item i { display: block; font-size: 20px; margin-bottom: 4px; }

        .pmh-tab-btn { white-space: nowrap !important; flex-shrink: 0 !important; }

        /* ========================================================
           태블릿 / PC 가로 화면 대응: 다이나믹 듀얼 뷰 레이아웃
           ======================================================== */
        @media (min-width: 769px) {
            #tool-form-container > div {
                display: grid !important;
                grid-template-columns: 50% 50%;
                grid-template-rows: auto 1fr;
                gap: 0;
            }

            #tool-form-container > div > div:nth-child(1) {
                grid-column: 1 / 3;
                grid-row: 1 / 2;
                position: relative;
                margin-bottom: 0 !important;
            }

            #tool-form-container > div > div:nth-child(1) > div {
                width: 50% !important;
                overflow: visible !important;
            }

            [data-tab="pmh_tab_monitor"] {
                position: absolute !important;
                left: 50% !important;
                bottom: 0 !important;
                margin-left: 15px !important;
                border-bottom: 2px solid transparent !important;
                color: #e5a00d !important;
                font-weight: bold !important;
                pointer-events: none !important; 
            }

            #pmh_tab_form, #pmh_tab_settings {
                grid-column: 1 / 2;
                grid-row: 2 / 3;
                border-right: 1px solid #333;
                padding-right: 15px;
                margin-top: 15px;
            }

            #pmh_tab_monitor {
                display: flex !important;
                grid-column: 2 / 3;
                grid-row: 2 / 3;
                padding-left: 15px;
                margin-top: 15px;
            }
        }

    </style>
</head>
<body>

    <div id="pwa-install-banner" style="display:none; background:var(--primary); color:#111; padding:12px 15px; font-size:13px; font-weight:bold; align-items:center; justify-content:space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index:9999; position:relative;">
        <div style="display:flex; align-items:center; gap:10px;">
            <i class="fas fa-download" style="font-size:20px;"></i>
            <span style="line-height:1.4;">홈 화면에 앱으로 추가하여<br>전체 화면으로 쾌적하게 사용하세요!</span>
        </div>
        <button id="btn-pwa-install" style="background:#111; color:var(--primary); border:none; padding:8px 12px; border-radius:6px; font-weight:bold; cursor:pointer;">설치</button>
    </div>

    <div id="screen-portal" class="screen active">
        <div id="portal-loading" style="text-align:center; padding:50px 0; color:#777; display:none;">
            <i class="fas fa-spinner fa-spin" style="font-size:30px; color:var(--primary); margin-bottom:15px;"></i><br>서버에서 정보를 불러오고 있습니다...
        </div>
        
        <div id="portal-content" style="display:none;">
            <div class="dashboard-grid">
                <div class="dash-card" id="dash-run">
                    <div style="font-size:11px; color:#aaa; margin-bottom:4px;"><i class="fas fa-running" style="color:var(--primary);"></i> 실행 중인 작업</div>
                    <div style="font-size:20px; font-weight:bold; color:#777;" id="dash-run-cnt">0건</div>
                </div>
                <div class="dash-card" id="dash-cron">
                    <div style="font-size:11px; color:#aaa; margin-bottom:4px;"><i class="fas fa-clock" style="color:var(--success);"></i> 스케줄링(크론)</div>
                    <div style="font-size:20px; font-weight:bold; color:#777;" id="dash-cron-cnt">0건</div>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0; font-size:15px; color:#ddd;"><i class="fas fa-toolbox"></i> 내 툴박스</h3>
                <button onclick="loadPortal()" style="background:none; border:none; color:var(--primary); font-size:16px; padding:5px;"><i class="fas fa-sync-alt"></i></button>
            </div>
            
            <div id="tool-list"></div>
        </div>

        <div id="portal-error" style="text-align:center; padding:50px 0; color:var(--danger); display:none;">
            <i class="fas fa-exclamation-triangle" style="font-size:30px; margin-bottom:15px;"></i><br>
            <span id="portal-error-msg">설정 탭에서 서버를 연결해주세요.</span>
        </div>
    </div>

    <div id="screen-setup" class="screen">
        <h2 style="margin-top:0; color:var(--primary); font-size:18px; border-bottom:1px solid var(--border); padding-bottom:15px;">
            <i class="fas fa-cogs"></i> 서버 연결 설정
        </h2>
        
        <div class="form-group">
            <label class="form-label"><i class="fas fa-network-wired"></i> 마스터 서버 URL</label>
            <input type="url" id="inp-url" class="input-text" placeholder="http://192.168.x.x:8899">
        </div>
        <div class="form-group">
            <label class="form-label"><i class="fas fa-key"></i> 마스터 API Key</label>
            <div style="display:flex; gap:10px;">
                <input type="password" id="inp-key" class="input-text" placeholder="BASE.APIKEY 입력" style="flex:1;">
                <button id="btn-copy-key" class="btn" style="width:50px; background:#333; color:#fff; padding:14px;"><i class="fas fa-copy"></i></button>
            </div>
        </div>
        
        <div style="display:flex; gap:10px; margin-top:30px;">
            <button id="btn-test" class="btn" style="background:#2f96b4; color:#fff; flex:1;"><i class="fas fa-plug"></i> 테스트</button>
            <button id="btn-save" class="btn btn-success" style="flex:2;"><i class="fas fa-save"></i> 저장 및 연결</button>
        </div>
    </div>

    <div id="screen-tool" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <button class="btn" onclick="showScreen('screen-portal')" style="background:#333; color:#fff; width:auto; padding:6px 12px; font-size:12px; border-radius:6px;">
                <i class="fas fa-arrow-left"></i> 홈으로
            </button>
            <div id="tool-view-title" style="font-weight:bold; color:var(--primary); font-size:15px;">로딩 중...</div>
        </div>

        <div id="tool-form-container" style="margin-bottom:10px; width:100%;"></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" data-target="screen-portal">
            <i class="fas fa-home"></i>홈
        </div>
        <div class="tab-item disabled" id="tab-tool" data-target="screen-tool">
            <i class="fas fa-wrench"></i>도구
        </div>
        <div class="tab-item" data-target="screen-setup">
            <i class="fas fa-cog"></i>설정
        </div>
    </div>

    <div id="toast">메시지</div>

    <script>
        let AppState = {
            url: localStorage.getItem('pmh_url') || window.location.origin,
            key: localStorage.getItem('pmh_key') || '',
            servers: [],      
            activeToolId: null,
            pollTimer: null
        };

        document.getElementById('inp-url').value = AppState.url;
        document.getElementById('inp-key').value = AppState.key;

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.innerHTML = msg;
            t.style.background = isError ? 'var(--danger)' : 'var(--success)';
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.tab-item').forEach(t => {
                if (!t.classList.contains('disabled')) {
                    t.classList.toggle('active', t.dataset.target === id);
                }
            });

            if (AppState.pollTimer && id !== 'screen-tool') {
                clearTimeout(AppState.pollTimer);
                AppState.pollTimer = null;
            }
        }

        document.querySelectorAll('.tab-item').forEach(t => {
            t.addEventListener('click', () => {
                if (t.dataset.target === 'screen-portal' && AppState.servers.length > 0) loadPortal();
                showScreen(t.dataset.target);
            });
        });

        async function generateSecureHeader(apiKey) {
            if (!apiKey) return "";
            
            const timestamp = Math.floor(Date.now() / 10000) * 10;
            const payload = `${apiKey}:${timestamp}`;
            const encoder = new TextEncoder();
            const data = encoder.encode(payload);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            return `${timestamp}.${hashHex}`;
        }

        const PmhAPI = {
            call: async function(endpoint, method="GET", data=null) {
                if(!AppState.url || !AppState.key) throw new Error("서버 정보가 설정되지 않았습니다.");
                
                const secureToken = await generateSecureHeader(AppState.key);
                
                const options = { 
                    method: method, 
                    headers: { "X-PMH-Signature": secureToken }
                };
                if (data) { 
                    options.headers["Content-Type"] = "application/json"; 
                    options.body = JSON.stringify(data); 
                }
                
                try {
                    const res = await fetch(`${AppState.url}/api${endpoint}`, options);
                    
                    if (!res.ok) {
                        try {
                            const errJson = await res.json();
                            throw new Error(errJson.error || errJson.message || `HTTP ${res.status}`);
                        } catch(e) {
                            throw new Error(`서버 응답 오류 (HTTP ${res.status})`);
                        }
                    }

                    const contentType = res.headers.get("content-type");
                    if (contentType && contentType.includes("application/json")) {
                        return await res.json();
                    }
                    
                    return await res.text();
                    
                } catch(e) {
                    throw new Error(e.message || "네트워크 오류 또는 서버 응답 실패");
                }
            }
        };

        async function loadSharedCoreModules() {
            return new Promise((resolve, reject) => {
                let loadedCount = 0;
                const checkDone = () => { if (++loadedCount === 2) resolve(); };

                if (!document.getElementById('pmh-shared-css')) {
                    const link = document.createElement('link');
                    link.id = 'pmh-shared-css'; link.rel = 'stylesheet';
                    link.href = `${AppState.url}/api/client/pmh_ui_core.css?t=${Date.now()}`;
                    link.onload = checkDone; link.onerror = () => reject("UI Core CSS 로드 실패");
                    document.head.appendChild(link);
                } else { checkDone(); }

                if (!document.getElementById('pmh-shared-js')) {
                    const script = document.createElement('script');
                    script.id = 'pmh-shared-js';
                    script.src = `${AppState.url}/api/client/pmh_ui_core.js?t=${Date.now()}`;
                    script.onload = checkDone; script.onerror = () => reject("UI Core JS 로드 실패");
                    document.head.appendChild(script);
                } else { checkDone(); }
            });
        }

        async function connectServer(isTest = false) {
            const url = document.getElementById('inp-url').value.trim().replace(/\/$/, '');
            const key = document.getElementById('inp-key').value.trim();

            if (!url || !key) return showToast("URL과 접속 키를 입력하세요.", true);

            const btn = isTest ? document.getElementById('btn-test') : document.getElementById('btn-save');
            const origHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                AppState.url = url; AppState.key = key; 
                
                const conf = await PmhAPI.call('/client/config');
                
                if(isTest) {
                    showToast("마스터 서버 연결 테스트 성공!");
                } else {
                    localStorage.setItem('pmh_url', url);
                    localStorage.setItem('pmh_key', key);
                    
                    AppState.servers = conf.SERVERS || [];

                    await loadSharedCoreModules();
                    
                    showToast("설정 저장 및 연결 완료!");
                    loadPortal();
                    showScreen('screen-portal');
                }
            } catch(e) {
                showToast("연결 실패: " + e.message, true);
            } finally {
                btn.innerHTML = origHtml;
                btn.disabled = false;
            }
        }

        document.getElementById('btn-test').addEventListener('click', () => connectServer(true));
        document.getElementById('btn-save').addEventListener('click', () => connectServer(false));

        const copyBtn = document.getElementById('btn-copy-key');
        if (copyBtn) {
            copyBtn.addEventListener('click', () => {
                const keyInput = document.getElementById('inp-key');
                if (!keyInput.value) {
                    showToast("복사할 API Key가 없습니다.", true);
                    return;
                }
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(keyInput.value).then(() => {
                        showToast("API Key가 복사되었습니다.");
                    }).catch(err => {
                        showToast("복사 실패. 브라우저 권한을 확인하세요.", true);
                    });
                } else {
                    keyInput.type = "text"; 
                    keyInput.select();
                    try {
                        document.execCommand("copy");
                        showToast("API Key가 복사되었습니다.");
                    } catch (err) {
                        showToast("복사 실패. 수동으로 복사해주세요.", true);
                    }
                    keyInput.type = "password"; 
                    window.getSelection().removeAllRanges();
                }
            });
        }

        async function loadPortal() {
            document.getElementById('portal-loading').style.display = 'block';
            document.getElementById('portal-content').style.display = 'none';
            document.getElementById('portal-error').style.display = 'none';

            try {
                const masterNodeId = AppState.servers[0].id || 'master_node';
                const res = await PmhAPI.call(`/relay/${masterNodeId}/tools`);
                
                const runCnt = res.dashboard.running.length;
                const cronCnt = res.dashboard.cron.length;
                
                document.getElementById('dash-run-cnt').innerText = `${runCnt}건`;
                document.getElementById('dash-cron-cnt').innerText = `${cronCnt}건`;
                
                const cardRun = document.getElementById('dash-run');
                const cardCron = document.getElementById('dash-cron');
                runCnt > 0 ? cardRun.classList.add('active-run') : cardRun.classList.remove('active-run');
                cronCnt > 0 ? cardCron.classList.add('active-cron') : cardCron.classList.remove('active-cron');
                
                document.getElementById('dash-run-cnt').style.color = runCnt > 0 ? 'var(--primary)' : '#777';
                document.getElementById('dash-cron-cnt').style.color = cronCnt > 0 ? 'var(--success)' : '#777';

                const listEl = document.getElementById('tool-list');
                listEl.innerHTML = '';
                
                if (!res.tools || res.tools.length === 0) {
                    listEl.innerHTML = '<div style="text-align:center; color:#777; padding:20px;">설치된 툴이 없습니다.</div>';
                } else {
                    res.tools.sort((a, b) => (a.name || a.id || "").toLowerCase().localeCompare((b.name || b.id || "").toLowerCase()));

                    res.tools.forEach(t => {
                        const myRun = res.dashboard.running.filter(r => r.tool_id === t.id);
                        const myCron = res.dashboard.cron.filter(c => c.tool_id === t.id);
                        const isRunning = myRun.length > 0;
                        
                        let badgeHtml = '';
                        if (isRunning) badgeHtml += `<span class="badge badge-run"><i class="fas fa-running"></i> 진행중</span> `;
                        if (myCron.length > 0) badgeHtml += `<span class="badge badge-cron"><i class="fas fa-clock"></i> 스케줄</span>`;

                        listEl.insertAdjacentHTML('beforeend', `
                            <div class="tool-card ${isRunning ? 'running' : ''}" onclick="openTool('${t.id}')">
                                <div class="tool-icon"><i class="${t.icon || 'fas fa-wrench'}"></i></div>
                                <div class="tool-info">
                                    <div class="tool-title" style="display:flex; align-items:center; flex-wrap:wrap; gap:6px; white-space:normal;">
                                        ${t.name || t.id} 
                                        <span style="font-size:11px; color:#777; font-weight:normal;">v${t.version || '1.0'}</span>
                                        ${isRunning ? '<i class="fas fa-spinner fa-spin" style="font-size:12px; color:var(--primary);"></i>' : ''}
                                    </div>
                                    <div class="tool-desc" style="white-space:normal; line-height:1.4; margin-top:2px;">
                                        ${t.description || ''}
                                    </div>
                                    <div style="margin-top:6px;">${badgeHtml}</div>
                                </div>
                                <i class="fas fa-chevron-right" style="color:#555; font-size:16px;"></i>
                            </div>
                        `);
                    });
                }

                document.getElementById('portal-loading').style.display = 'none';
                document.getElementById('portal-content').style.display = 'block';

            } catch(e) {
                document.getElementById('portal-loading').style.display = 'none';
                document.getElementById('portal-error').style.display = 'block';
                document.getElementById('portal-error-msg').innerText = "데이터 로드 실패: " + e.message;
            }
        }

        async function openTool(toolId, forceSrvIdx = null) {
            AppState.activeToolId = toolId;
            
            const tabTool = document.getElementById('tab-tool');
            tabTool.classList.remove('disabled');
            
            showScreen('screen-tool');
            document.getElementById('tool-view-title').innerText = "로딩 중...";
            
            const container = document.getElementById('tool-form-container');
            container.innerHTML = '<div style="text-align:center; padding:30px;"><i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary);"></i></div>';

            const globalCacheStr = localStorage.getItem(`pmh_tool_cache_global_${toolId}`) || "{}";
            let globalCache = {}; try { globalCache = JSON.parse(globalCacheStr); } catch(e) {}
            
            let srvIdx = (forceSrvIdx !== null && forceSrvIdx !== undefined) ? Number(forceSrvIdx) : (globalCache['target_server_idx'] || 0);
            if (srvIdx >= AppState.servers.length) srvIdx = 0;
            
            globalCache['target_server_idx'] = srvIdx; 
            localStorage.setItem(`pmh_tool_cache_global_${toolId}`, JSON.stringify(globalCache));

            const activeServerNode = AppState.servers[srvIdx] || {};
            const activeServerId = activeServerNode.id || 'master_node';
            const activeMachineId = activeServerNode.machine_id || 'default';
            
            try {
                if (typeof PmhUICore === 'undefined') throw new Error("UI 코어 모듈이 로드되지 않았습니다.");

                const uiSchema = await PmhAPI.call(`/relay/${activeServerId}/tool/${toolId}/ui?server_id=${activeMachineId}`);
                document.getElementById('tool-view-title').innerText = uiSchema.title || toolId;

                PmhUICore.createToolInstance({
                    container: container,
                    toolId: toolId,
                    uiSchema: uiSchema,
                    servers: AppState.servers,
                    activeServerIdx: srvIdx,
                    
                    apiAdapter: {
                        run: async (data) => await PmhAPI.call(`/relay/${activeServerId}/tool/${toolId}/run`, "POST", data),
                        status: async (taskId) => await PmhAPI.call(`/relay/${activeServerId}/tool/${toolId}/status?task_id=${taskId}&server_id=${activeMachineId}`, "GET"),
                        cancel: async (taskId) => await PmhAPI.call(`/relay/${activeServerId}/tool/${toolId}/cancel`, "POST", {task_id: taskId, _server_id: activeMachineId})
                    },
                    toast: { success: (m)=>showToast(m), error: (m)=>showToast(m, true), info: (m)=>showToast(m) }
                });

                setTimeout(() => {
                    const srvSelectEl = document.getElementById('pmh_srv_select');
                    if (srvSelectEl) {
                        srvSelectEl.addEventListener('change', (e) => {
                            const newIdx = Number(e.target.value);
                            globalCache['target_server_idx'] = newIdx;
                            localStorage.setItem(`pmh_tool_cache_global_${toolId}`, JSON.stringify(globalCache));
                            openTool(toolId, newIdx);
                        });
                    }
                }, 100);

                if (!window.dualPaneObserver) {
                    window.dualPaneObserver = new MutationObserver(() => {
                        if (window.innerWidth > 768) {
                            const form = document.getElementById('pmh_tab_form');
                            const settings = document.getElementById('pmh_tab_settings');
                            const monitorTabBtn = document.querySelector('[data-tab="pmh_tab_monitor"]');
                            const formTabBtn = document.querySelector('[data-tab="pmh_tab_form"]');
                            
                            if (form && settings && form.style.display === 'none' && settings.style.display === 'none') {
                                form.style.display = 'flex';
                                if (monitorTabBtn) monitorTabBtn.classList.remove('active');
                                if (formTabBtn) formTabBtn.classList.add('active');
                            }
                        }
                    });
                }
                window.dualPaneObserver.disconnect();
                window.dualPaneObserver.observe(container, { attributes: true, subtree: true, attributeFilter: ['style'] });

            } catch(e) { 
                showToast("툴을 불러오지 못했습니다. " + e.message, true); 
                showScreen('screen-portal'); 
            }
        }

        if (AppState.url && AppState.key) connectServer(false);
        else showScreen('screen-setup');

        let deferredPrompt;
        const installBanner = document.getElementById('pwa-install-banner');
        const installBtn = document.getElementById('btn-pwa-install');

        const isStandalone = window.matchMedia('(display-mode: standalone)').matches 
                             || window.navigator.standalone 
                             || document.referrer.includes('android-app://');

        if (!isStandalone) {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBanner.style.display = 'flex';
            });

            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (isIOS) {
                installBanner.style.display = 'flex';
                installBanner.innerHTML = `<div style="display:flex; align-items:center; gap:10px;"><i class="fas fa-share-square" style="font-size:20px;"></i><span style="line-height:1.4;">Safari 하단의 '공유' 버튼을 누르고<br>'홈 화면에 추가'를 선택하세요.</span></div><button onclick="document.getElementById('pwa-install-banner').style.display='none'" style="background:transparent; border:none; color:#111; font-size:20px; cursor:pointer;"><i class="fas fa-times"></i></button>`;
            }
        }

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    installBanner.style.display = 'none';
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    deferredPrompt = null;
                }
            });
        }
    </script>
</body>
</html>
