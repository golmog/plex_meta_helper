# ====================================================================================
# [PMH 고급 필터링 설정 파일]
# 이 파일의 이름을 'filters.yaml' 로 변경하여 개별 툴 폴더에 저장하면, 툴 실행 시 자동으로 적용됩니다.
# (스마트 스캐너, 배치 스캐너, JAV 매니저 공용)
# ====================================================================================
#
# [동작 원리]
# 1. include (포함): 설정된 규칙 중 **하나라도 일치하는 항목만** 조회 대상에 포함됩니다. (비워두면 모두 포함)
# 2. exclude (제외): 설정된 규칙 중 **하나라도 일치하면 즉시 제외(무시)**됩니다. (include보다 우선하여 탈락시킴)
#
# [사용 가능한 필드 (field)]
# - guid  : 에이전트 식별자 (예: com.plexapp.agents.hama://...)
# - title : 라이브러리에 표시되는 제목 (예: 아이언맨 (2008))
# - path  : 파일 및 폴더의 물리적 전체 경로 (예: /mnt/media/movies/Iron Man.mp4)
# ※ 필드명은 쉼표(,)로 구분하여 여러 개를 동시에 지정할 수 있습니다. (예: "guid, title")
#
# [키워드 작성 (list)]
# - 대소문자를 구분하지 않습니다. (ABC = abc)
# - 정규표현식(Regex)을 지원합니다. (예: \.mp4$, ^\[sod\] 등)
# - 정규식을 사용하려면 규칙 앞에 `regex||`을 사용해 명시적으로 정규식임을 선언합니다.
# - 정규식에 백슬래시(\)를 쓸 때는 따옴표 없이 쓰거나, 작은 따옴표(' ')로 묶어서 쓰세요.
#
# [특수 옵션 (schedule_only)]
# - schedule_only: true 로 설정하면, 해당 규칙은 '자동 실행 스케줄러(Cron)'가 
#   돌아갈 때만 작동하며, 사용자가 직접 UI에서 조회/실행할 때는 무시됩니다.
# ====================================================================================

include:
  # 예시: 파일 경로나 제목에 'marvel'이나 'dc'가 들어가는 항목만 조회하고 싶을 때
  # - field: "title, path"
  #   list:
  #     - "(marvel|dc)"

  # 예시: 특정 폴더 하위의 영상들만 스캔하고 싶을 때
  # - field: path
  #   list:
  #     - "/mnt/media/adult/vr/"


exclude:
  # 예시 1: 수동 매칭 등 특정 영상을 보호할 때
  - field: guid
    schedule_only: true                    # 자동 스케줄러에서만 이 필터 작동
    list:
      - 12345abcde                         # 특정 아이템의 고유 해시값
      - "sjva_agent://KD104327"            # 특정 품번
      - "com.plexapp.agents.sjva_agent"    # SJVA 에이전트로 매칭된 모든 항목 건너뛰기

  # 예시 2: 특정 제목 패턴을 무시할 때
  - field: title
    list:
      - 감독판                             # 제목에 '감독판'이 포함된 항목 스킵
      - 특집$                              # 제목이 '특집'으로 끝나는 항목 스킵

  # 예시 3: 특정 경로에 있는 파일이나 특정 확장자를 무시할 때
  - field: path
    # 아래처럼 정규식과 단순 텍스트(plain)를 한 목록에 자유롭게 섞어 쓸 수 있습니다.
    list:
      - regex||\.mp4$                                            # 정규식: mp4로 끝나는 파일
      - regex||/mnt/media/adult/(vr|3d)/                         # 정규식: vr 또는 3d 폴더
      - "/mnt/gds/VIDEO/외국TV/IQ246 ~화려한 사건부~ (2016)"     # 단순 텍스트: 괄호나 기호를 특수문자로 인식하지 않음
      - sample_video_123.mkv                                     # 단순 텍스트: 점(.)을 아무 글자나 매칭하는 특수문자로 인식하지 않음
